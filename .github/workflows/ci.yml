name: ElectroView CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:

  # ────────────────────────────────────────────────────────────
  # CI: Build and run all tests on every push and PR
  # ────────────────────────────────────────────────────────────
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: electroview/pom.xml

      - name: Build with Maven
        run: mvn -B clean compile

      - name: Run all tests
        run: mvn -B test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: electroview/target/surefire-reports/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # CD: Build and publish JAR artifact only when merged to main
  # ────────────────────────────────────────────────────────────
  release:
    name: Build Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: electroview/pom.xml

      - name: Build production JAR
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: electroview-jar
          path: electroview/target/electroview-*.jar
          retention-days: 30